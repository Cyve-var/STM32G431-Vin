source [find x:/Firmware/Cfg/stlink-dap.cfg]
source [find target/swj-dp.tcl]

#transport select "dapdirect_swd"

swj_newdap mychip cpu -expected-id 0x0bc11477
dap create mychip.dap -chain-position mychip.cpu
target create MyTarget cortex_m -endian little -dap mychip.dap

cortex_m reset_config sysresetreq
adapter speed 480

MyTarget configure -work-area-phys 0x20000000 -work-area-size 1000 -work-area-backup 0
flash bank myChip.flash stm32lx 0x08000000 0 0 0 MyTarget